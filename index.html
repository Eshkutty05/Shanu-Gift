<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Surprise For Angel.....🧚‍♀️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    background: #ffe4e1;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    position: relative;
}

.slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 5;
    padding: 20px;
    box-sizing: border-box;
}

.active { display: flex; }

h1, h2 {
    color: #d63384;
    padding: 0 20px;
}

#count-num {
    font-size: 8rem;
    color: #ff4d6d;
    font-weight: bold;
}

.gifts-wrap {
    display: flex;
    gap: 20px;
    margin-top: 30px;
}

.gift-box {
    font-size: 85px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.gift-box:hover {
    transform: scale(1.08);
}

.fairy-static {
    width: 220px;
    margin-bottom: 20px;
    display: none;
}

#cakeHint {
    color: #c2185b;
    margin-top: 10px;
    margin-bottom: 6px;
    font-weight: bold;
    font-size: 24px;
    animation: fadeBlink 1.5s infinite;
}

#bigHeart {
    font-size: 120px;
    margin: 10px 0 8px;
    animation: heartBeat 1.2s infinite;
    text-shadow:
        0 0 15px rgba(255,105,180,0.9),
        0 0 30px rgba(255,105,180,0.75),
        0 0 50px rgba(255,20,147,0.45);
}

#cake {
    font-size: 100px;
    cursor: pointer;
}

.shake-anim { animation: shake 0.1s infinite; }

@keyframes shake {
    0% { transform: translate(2px, 1px); }
    50% { transform: translate(-1px, -2px); }
    100% { transform: translate(1px, 2px); }
}

@keyframes heartBeat {
    0% { transform: scale(1); }
    25% { transform: scale(1.18); }
    50% { transform: scale(1); }
    75% { transform: scale(1.18); }
    100% { transform: scale(1); }
}

@keyframes fadeBlink {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

button {
    padding: 15px 40px;
    border-radius: 50px;
    border: none;
    background: #f08094;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 25px;
    font-size: 16px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    transition: 0.3s ease;
}

button:hover {
    background: #e56f87;
    transform: translateY(-2px);
}

input {
    padding: 14px;
    border-radius: 30px;
    border: 2px solid #ffafbd;
    text-align: center;
    font-size: 16px;
    outline: none;
}

.mega-spark {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    z-index: 100;
    pointer-events: none;
}

.magic {
    position: absolute;
    animation: flyUp 6.5s linear infinite;
    z-index: 1;
    pointer-events: none;
}

@keyframes flyUp {
    0% { transform: translateY(110vh); opacity: 0; }
    20% { opacity: 0.8; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* Glittering floating hearts */
.glitter-heart {
    position: absolute;
    z-index: 2;
    pointer-events: none;
    animation: glitterFloat linear forwards;
    filter: drop-shadow(0 0 8px rgba(255,105,180,0.8))
            drop-shadow(0 0 18px rgba(255,182,193,0.7));
}

@keyframes glitterFloat {
    0% {
        transform: translateY(110vh) scale(0.7) rotate(0deg);
        opacity: 0;
    }
    10% {
        opacity: 0.95;
    }
    50% {
        transform: translateY(45vh) translateX(10px) scale(1.05) rotate(8deg);
        opacity: 0.9;
    }
    100% {
        transform: translateY(-15vh) translateX(-15px) scale(0.8) rotate(-8deg);
        opacity: 0;
    }
}

.romantic-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(255,182,193,0.5), rgba(255,105,180,0.2), transparent);
    animation: romanticPulse 3s ease-in-out infinite;
    z-index: 0;
    pointer-events: none;
}

@keyframes romanticPulse {
    0% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.1); }
    100% { opacity: 0.3; transform: scale(1); }
}

#loveLetter {
    display: none;
    max-width: 650px;
    height: 260px;
    overflow-y: auto;
    padding: 20px;
    margin-top: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.85);
    color: #d63384;
    font-size: 16px;
    line-height: 1.7;
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

/* SECOND GIFT HEART GALLERY */
.heart-memory-frame {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 12px;
}

.heart-gallery {
    position: relative;
    width: 430px;
    height: 400px;
    animation: softZoom 1.5s ease;
}

.heart-gallery img {
    position: absolute;
    width: 95px;
    height: 95px;
    object-fit: cover;
    border-radius: 18px;
    border: 4px solid #fff;
    box-shadow: 0 8px 18px rgba(0,0,0,0.22);
    cursor: pointer;
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    animation: fadeFloat 1.2s ease;
}

.heart-gallery img:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 22px rgba(214,51,132,0.35);
}

.heart-gallery img:nth-child(1) { top: 10px; left: 165px; }
.heart-gallery img:nth-child(2) { top: 70px; left: 60px; }
.heart-gallery img:nth-child(3) { top: 70px; right: 60px; }
.heart-gallery img:nth-child(4) { top: 185px; left: 100px; }
.heart-gallery img:nth-child(5) { top: 185px; right: 100px; }
.heart-gallery img:nth-child(6) { top: 300px; left: 165px; }

.heart-gallery .center-photo {
    width: 130px;
    height: 130px;
    top: 125px;
    left: 150px;
    z-index: 5;
    border-radius: 22px;
    border: 5px solid #fff;
    box-shadow: 0 12px 28px rgba(0,0,0,0.28);
}

.heart-glow {
    position: absolute;
    top: 118px;
    left: 143px;
    width: 145px;
    height: 145px;
    background: radial-gradient(circle, rgba(255,105,180,0.45), rgba(255,182,193,0.18), transparent);
    border-radius: 50%;
    z-index: 1;
    animation: heartBeatGlow 1.8s infinite ease-in-out;
}

@keyframes heartBeatGlow {
    0% { transform: scale(1); opacity: 0.55; }
    50% { transform: scale(1.14); opacity: 0.85; }
    100% { transform: scale(1); opacity: 0.55; }
}

@keyframes fadeFloat {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.8);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes softZoom {
    from {
        opacity: 0;
        transform: scale(0.88);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

.memory-line {
    color: #c2185b;
    font-size: 18px;
    margin-top: 16px;
    max-width: 700px;
    line-height: 1.6;
    background: rgba(255,255,255,0.65);
    padding: 12px 18px;
    border-radius: 16px;
}

video {
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

#popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.88);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
    padding: 20px;
    box-sizing: border-box;
}

#popup img {
    max-width: 90%;
    max-height: 85%;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(255,255,255,0.15);
}

@media (max-width: 600px) {
    #count-num {
        font-size: 5rem;
    }

    .gifts-wrap {
        gap: 14px;
    }

    .gift-box {
        font-size: 70px;
    }

    .heart-gallery {
        transform: scale(0.82);
    }

    .memory-line {
        font-size: 16px;
        max-width: 90%;
    }

    #loveLetter {
        max-width: 90%;
        height: 240px;
        font-size: 15px;
    }

    #bigHeart {
        font-size: 90px;
    }

    #cakeHint {
        font-size: 20px;
    }

    #cake {
        font-size: 85px;
    }
}
</style>
</head>

<body>

<audio id="bgMusic" autoplay loop>
    <source src="melody.mp3" type="audio/mp3">
</audio>

<div class="slide active" id="s1">
    <h1>A Surprise Gift For Shanu... 🎁</h1>
    <input type="password" id="pass" placeholder="Secret Key">
    <button onclick="checkPass()">Unlock My Heart ❤️</button>
</div>

<div class="slide" id="s2">
    <h1 id="msg1"></h1>
    <button onclick="goToSlide(3)">Next ✨</button>
</div>

<div class="slide" id="s3">
    <h1>Ready for the magic, My Dear?</h1>
    <button onclick="startCountdown()">Start the Magic! 🚀</button>
</div>

<div class="slide" id="s4">
    <div id="count-num">10</div>
    <h2 id="wait-msg">Wait for it...</h2>

    <div class="gifts-wrap" id="gift-reveal" style="display:none;">
        <div class="gift-box" onclick="goToSlide(6)">🎁</div>
        <div class="gift-box" onclick="goToSlide(7)">🎁</div>
        <div class="gift-box" onclick="openVideoGift()">🎁</div>
    </div>
</div>

<div class="slide" id="s6">
    <h2 id="finalTitle">Happy Birthday My Angel....🧚‍♀️!!!</h2>
    <img src="fairy.png" id="surpFairy" class="fairy-static" alt="Fairy">

    <h3 id="cakeHint">Click on the cake 🎂</h3>
    <div id="bigHeart">💖</div>
    <div id="cake" onclick="handleCakeClick()">🎂</div>

    <h2 id="poetryLine" style="display:none;"></h2>
    <div id="loveLetter"></div>

    <button onclick="goToSlide(4)">Open another gift! 🎁</button>
</div>

<div class="slide" id="s7">
    <h2>A Heart Full of Memories 💖</h2>

    <div class="heart-memory-frame">
        <div class="heart-gallery">
            <img src="photo1.jpg" onclick="openPopup(this)" alt="Photo 1">
            <img src="photo2.jpg" onclick="openPopup(this)" alt="Photo 2">
            <img src="photo3.jpg" onclick="openPopup(this)" alt="Photo 3">
            <img src="photo4.jpg" onclick="openPopup(this)" alt="Photo 4">
            <img src="photo5.jpg" onclick="openPopup(this)" alt="Photo 5">
            <img src="photo6.jpg" onclick="openPopup(this)" alt="Photo 6">

            <div class="heart-glow"></div>
            <img src="center.jpg" class="center-photo" onclick="openPopup(this)" alt="Center Photo">
        </div>
    </div>

    <p class="memory-line">
        Every memory has a place in my heart... but at the center of it all, it is always you ❤️
    </p>

    <button onclick="goToSlide(4)">Open another gift! 🎁</button>
</div>

<div class="slide" id="s8">
    <h2>A Special Surprise 🎥💖</h2>

    <video id="giftVideo" width="320" controls playsinline>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <br><br>
    <button onclick="goToSlide(4)">Back to Gifts 🎁</button>
</div>

<div id="popup" onclick="closePopup()">
    <img id="popup-img" alt="Popup Image">
</div>

<script>
function checkPass() {
    if (document.getElementById("pass").value === "2304") {
        goToSlide(2);
    } else {
        alert("Try 2304! ❤️");
    }
}

function goToSlide(n) {
    document.querySelectorAll(".slide").forEach(s => s.classList.remove("active"));
    document.getElementById("s" + n).classList.add("active");

    let vid = document.getElementById("giftVideo");
    if (vid && n !== 8) {
        vid.pause();
        vid.currentTime = 0;
    }

    if (n === 2) {
        typeEffect("msg1", "23 April — A Magical Day! ✨<br>A beautiful day for a beautiful soul. ✨<br> That is YOU! ❤️");
    }

    if (n === 8) {
        stopMusic();
    }
}

function openVideoGift() {
    goToSlide(8);

    let vid = document.getElementById("giftVideo");
    if (vid) {
        vid.currentTime = 0;
        vid.muted = false;

        let playPromise = vid.play();
        if (playPromise !== undefined) {
            playPromise.catch(() => {
                vid.muted = true;
                vid.play();
            });
        }
    }
}

function typeEffect(id, text) {
    let i = 0;
    let el = document.getElementById(id);
    el.innerHTML = "";

    let t = setInterval(() => {
        if (i < text.length) {
            if (text.substr(i, 4) === "<br>") {
                el.innerHTML += "<br>";
                i += 4;
            } else {
                el.innerHTML += text[i];
                i++;
            }
        } else {
            clearInterval(t);
        }
    }, 60);
}

function startCountdown() {
    goToSlide(4);
    let c = 10;

    document.getElementById("count-num").style.display = "block";
    document.getElementById("count-num").innerText = c;
    document.getElementById("gift-reveal").style.display = "none";
    document.getElementById("wait-msg").innerText = "Wait for it...";

    let t = setInterval(() => {
        c--;
        document.getElementById("count-num").innerText = c;

        if (c <= 0) {
            clearInterval(t);
            document.getElementById("count-num").style.display = "none";
            document.getElementById("wait-msg").innerText = "Happy Birthday Dear ❤️!!!";
            document.getElementById("gift-reveal").style.display = "flex";
            megaBlast();
        }
    }, 1000);
}

function handleCakeClick() {
    let cake = document.getElementById("cake");
    cake.classList.add("shake-anim");

    setTimeout(() => {
        cake.style.display = "none";
        document.getElementById("surpFairy").style.display = "none";
        document.getElementById("bigHeart").style.display = "none";
        document.getElementById("cakeHint").style.display = "none";

        document.getElementById("finalTitle").innerText = "Shanu, You mean everything to me ❤️";

        let line = document.getElementById("poetryLine");
        line.innerHTML = "In a sky full of stars... ✨<br>You are my only moon 🌙💖";
        line.style.display = "block";

        let letter = document.getElementById("loveLetter");
        letter.style.display = "block";

        letter.innerHTML = `
        “You didn’t just enter my life… you slowly became a feeling I didn’t even realize I needed ✨🌙<br><br>

Even in the silence, without calls or messages, you still meant so much to me… more than I ever showed ❤️‍🩹🥺<br><br>

Some people don’t need reasons or labels… they just become a part of you that you never want to lose 🤍✨🌸<br><br>

Happy Birthday my dear Shanu… 🧚‍♀️✨ you mean more than you’ll ever know 💫💖<br><br>

<b>Once again Happy Birthday, My DEAR.....! 🎂❤️<br>I MISS YOU 🥺</b>
        `;

        megaBlast();
        showRomanticEffect();
    }, 900);
}

function showRomanticEffect() {
    let bg = document.createElement("div");
    bg.className = "romantic-bg";
    document.body.appendChild(bg);
    setTimeout(() => bg.remove(), 6000);
}

function megaBlast() {
    for (let i = 0; i < 120; i++) {
        let s = document.createElement("div");
        s.className = "mega-spark";
        s.style.background = "#ff4d6d";
        s.style.left = "50vw";
        s.style.top = "50vh";
        document.body.appendChild(s);

        let dx = (Math.random() - 0.5) * 800;
        let dy = (Math.random() - 0.5) * 800;

        s.animate(
            [
                { transform: 'translate(0,0)', opacity: 1 },
                { transform: `translate(${dx}px,${dy}px)`, opacity: 0 }
            ],
            { duration: 2000 }
        );

        setTimeout(() => s.remove(), 2000);
    }
}

setInterval(() => {
    let m = document.createElement("div");
    m.className = "magic";
    m.innerHTML = ["🦋", "❤️", "✨"][Math.floor(Math.random() * 3)];
    m.style.left = Math.random() * 98 + "vw";
    m.style.fontSize = (Math.random() * 15 + 15) + "px";
    document.body.appendChild(m);
    setTimeout(() => m.remove(), 5000);
}, 450);

setInterval(() => {
    let h = document.createElement("div");
    h.className = "glitter-heart";
    h.innerHTML = ["💖", "💕", "💗", "✨"][Math.floor(Math.random() * 4)];
    h.style.left = Math.random() * 96 + "vw";
    h.style.fontSize = (Math.random() * 18 + 18) + "px";
    h.style.animationDuration = (Math.random() * 2 + 2) + "s";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 8500);
}, 1200);

function openPopup(img) {
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popup-img").src = img.src;
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

const music = document.getElementById("bgMusic");

window.addEventListener("load", () => {
    if (music) {
        music.volume = 0.6;
        let playPromise = music.play();

        if (playPromise !== undefined) {
            playPromise.catch(() => {
                document.body.addEventListener("click", () => {
                    music.play();
                }, { once: true });
            });
        }
    }
});

function stopMusic() {
    if (music) {
        music.pause();
        music.currentTime = 0;
    }
}
</script>

</body>
</html>
